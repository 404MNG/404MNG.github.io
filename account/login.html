<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uxarieus | Secure Access</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Sansation:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="login-container">
        <a href="../index.html" class="back-link">← TERMINAL EXIT</a>

        <div class="login-card">
            <div class="scan-line"></div>
            
            <header class="login-header">
                <h3 class="subtitle">SECURITY CLEARANCE</h3>
                <h1 class="glitch-title">CITIZEN LOGIN</h1>
                <p id="status-msg">Verifying biological signature...</p>
            </header>

            <form class="login-form">
                <div class="input-group">
                    <label>CITIZEN ID</label>
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                
                <div class="input-group">
                    <label>ACCESS KEY</label>
                    <input type="password" id="access_key" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">INITIALIZE LINK</button>
            </form>
        </div>
    </div>

    <script>
    // 1. CONNECTION DETAILS
    const supabaseUrl = 'https://rzzondwhtswpfeawujfu.supabase.co'; 
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6em9uZHdodHN3cGZlYXd1amZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjU0NTgsImV4cCI6MjA5MjIwMTQ1OH0.goHmfnExU2y2n-SkG1T51RT4k8eAn2BTGdHVWcOA3OY';
    
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const loginForm = document.querySelector('.login-form');
    const btn = document.querySelector('.login-btn');
    const statusMsg = document.getElementById('status-msg');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const userVal = document.getElementById('username').value.trim();
        const keyVal = document.getElementById('access_key').value.trim();
        
        btn.innerText = "FETCHING UUID...";
        btn.disabled = true;

        try {
            // STEP A: Fetch UUID from Mojang API (Handles name changes)
            const mojangRes = await fetch(`https://api.minetools.eu/uuid/${userVal}`);
            const mcData = await mojangRes.json();

            if (mcData.status === "ERR") {
                throw new Error("Citizen Not Found in Mojang DB");
            }

            const playerUUID = mcData.id; 
            const currentName = mcData.name; // Their latest name

            btn.innerText = "QUERYING RECORDS...";

            // STEP B: Find citizen by UUID instead of Name
            const { data, error } = await _supabase
                .from('citizens')
                .select('*')
                .eq('uuid', playerUUID.toUpperCase()) 
                .eq('access_key', keyVal)
                .single();
            
            if (error || !data) {
                throw new Error("Invalid Signature");
            }

            // STEP C: Auto-Update Username in Supabase if it changed
            if (data.username !== currentName) {
                await _supabase
                    .from('citizens')
                    .update({ username: currentName })
                    .eq('uuid', playerUUID);
            }

            // STEP D: CHECK BANS/KICKS
            const now = new Date();
            const expiry = data.expiry_timestamp ? new Date(data.expiry_timestamp) : null;

            if (data.status === 'Banned' || (data.status === 'Kicked' && expiry > now)) {
                const reason = data.punishment_reason || "Violation of Town Conduct";
                btn.style.background = "#ff3366";
                btn.innerText = "ACCESS REVOKED";
                alert(`🚨 ACCESS DENIED\nStatus: ${data.status}\nReason: ${reason}`);
                btn.disabled = false;
                return;
            }

            // SUCCESS - SAVE TO LOCALSTORAGE
            btn.style.background = "#00ff88";
            btn.innerText = "ACCESS GRANTED";
            
            localStorage.setItem('citizenName', currentName);
            localStorage.setItem('citizenRank', data.rank || 'Resident');
            localStorage.setItem('citizenStatus', data.status);
            localStorage.setItem('citizenSector', data.sector);
            localStorage.setItem('citizenWarnings', data.warnings);
            localStorage.setItem('citizenReason', data.punishment_reason);

            setTimeout(() => {
                window.location.href = "../citizen/dashboard.html";
            }, 1000);

        } catch (err) {
            console.error("Login Error:", err);
            btn.style.background = "#ff3366";
            btn.innerText = (err.message === "Citizen Not Found in Mojang DB") ? "ID NOT RECOGNIZED" : "INVALID SIGNATURE";
            
            setTimeout(() => {
                btn.style.background = "#bc13fe";
                btn.innerText = "INITIALIZE LINK";
                btn.disabled = false;
            }, 2000);
        }
    });
    </script>
</body>
</html>
