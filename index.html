<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 1. Initialize Supabase
  const SUPABASE_URL = 'https://your-project-id.supabase.co';
  const SUPABASE_KEY = 'your-anon-public-key';
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function updateCitizenCount() {
    const counterElement = document.getElementById('citizen-total');

    try {
      // 2. Count the rows in your 'citizens' table
      const { count, error } = await supabase
        .from('profiles') // <-- Change this to your actual table name (e.g., 'citizens')
        .select('*', { count: 'exact', head: true });

      if (error) throw error;

      // 3. Update the UI
      counterElement.innerText = count || 0;

    } catch (err) {
      console.error('Error fetching count:', err);
      counterElement.innerText = 'Offline';
    }
  }

  // Run on load
  updateCitizenCount();
</script>
